name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://finance.sulaksono.id/ \
            --delete \
            --cache-control "index.html=no-cache,max-age=0" \
            --exclude "index.html"
          aws s3 cp frontend/index.html s3://finance.sulaksono.id/index.html \
            --cache-control "no-cache,max-age=0"

      - name: Invalidate CloudFront
        # Distribution ID for finance.sulaksono.id. Inlined as a literal (not a
        # variable) to avoid GitHub Actions injection surface. ListDistributions
        # is intentionally not used: it can't be granted per-distribution, so the
        # CI user is scoped only to cloudfront:CreateInvalidation on this ARN.
        run: |
          aws cloudfront create-invalidation \
            --region us-east-1 \
            --distribution-id E3FUF9L36MKNR \
            --paths "/*"

  deploy-backend:
    name: Deploy Backend Lambda
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Zip
        run: |
          cd backend
          npm ci
          zip -r ../function.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ihsg-adl-api \
            --zip-file fileb://function.zip
